name: Socket Security

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  socket:
    runs-on: ubuntu-latest
    env:
      SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
      SOCKET_ORG: ${{ vars.SOCKET_ORG }}
    steps:
      - name: Check Socket configuration
        id: socket-config
        shell: bash
        run: |
          if [ -z "$SOCKET_SECURITY_API_KEY" ]; then
            echo "::notice title=Socket skipped::SOCKET_SECURITY_API_KEY is not available to this workflow run."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::add-mask::$SOCKET_SECURITY_API_KEY"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.socket-config.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.socket-config.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Resolve Socket organization
        id: socket-org
        if: steps.socket-config.outputs.enabled == 'true'
        shell: bash
        run: |
          if [ -n "$SOCKET_ORG" ]; then
            echo "org=$SOCKET_ORG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          response="$(curl --fail --silent --show-error --header "Authorization: Bearer $SOCKET_SECURITY_API_KEY" https://api.socket.dev/v0/organizations)"
          org="$(SOCKET_ORGS_JSON="$response" node --input-type=module <<'NODE'
          const data = JSON.parse(process.env.SOCKET_ORGS_JSON || "{}");
          const candidates = Array.isArray(data)
            ? data
            : data.organizations ?? data.data ?? data.results ?? data.items ?? [];
          const org = Array.isArray(candidates) ? candidates[0] : candidates;
          const slug = org?.slug ?? org?.org_slug ?? org?.name ?? "";
          if (!slug) {
            process.exit(1);
          }
          process.stdout.write(slug);
          NODE
          )" || org=""

          if [ -z "$org" ]; then
            echo "::error title=Socket org missing::Could not discover a Socket organization from the API token. Set SOCKET_ORG to the Socket organization slug."
            exit 1
          fi

          echo "org=$org" >> "$GITHUB_OUTPUT"

      - name: Install Socket CLI
        if: steps.socket-config.outputs.enabled == 'true'
        run: npm install --global socket@1.1.85

      - name: Run Socket policy scan
        if: steps.socket-config.outputs.enabled == 'true'
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          socket scan create --org "${{ steps.socket-org.outputs.org }}" --repo "$repo" --branch "$branch" --report --no-interactive .
